<section>
  <h1 class="pg-head">Meus Projetos</h1>
  <p class="pg-sub">Explore as soluções que desenvolvi recentemente.</p>

  <div class="topbar">
    <div class="t-search">
      <input type="text" placeholder="Buscar projeto..." [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)">
    </div>
  </div>

  <div class="proj-grid">
    @for (item of filteredProjects(); track item.id) {
    <article class="pc">
      <div class="pc-thumb"></div>
      <div style="padding: 20px;">
        <h3 class="feat-title">{{ item.title }}</h3>
        <p class="feat-desc">{{ item.desc }}</p>
      </div>
    </article>
    } @empty {
    <p>Nenhum projeto encontrado.</p>
    }
  </div>
</section>
